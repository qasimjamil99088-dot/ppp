<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home Page</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Add cursor pointer to indicate boxes are clickable */
    .card {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <nav class="navbar">
      <a href="index.html" class="logo">WebSite</a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </div>

  <h1 class="h3">Welcome to the Home Page!</h1>
  <div class="button-container">
    <button id="logoutBtn" class="btn1">Log Out</button>
  </div><br><br><br>

  <!-- Dynamic Card Grid Container -->
  <div class="card-grid" id="cardGrid"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCQdkuuTAvR7W7O4AKzvLG4E6p4yzRABJc",
      authDomain: "opih-e3eb5.firebaseapp.com",
      projectId: "opih-e3eb5",
      storageBucket: "opih-e3eb5.firebasestorage.app",
      messagingSenderId: "892201531636",
      appId: "1:892201531636:web:3765735604a0616752c6a1",
      measurementId: "G-9ZZ96PBRSP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 1. Auth Guard
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        loadMoviesFromFirestore();
      }
    });

    // 2. Fetch and render uploaded movies from Firestore
    async function loadMoviesFromFirestore() {
      const cardGrid = document.getElementById("cardGrid");

      try {
        const q = query(collection(db, "movies"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);

        cardGrid.innerHTML = ""; // Clear existing grid

        querySnapshot.forEach((doc) => {
          const movie = doc.data();
          const docId = doc.id; // Unique document ID

          // Create new card element dynamically
          const cardDiv = document.createElement("div");
          cardDiv.className = "card";

          cardDiv.innerHTML = `
            <div class="card-image">
              <img src="${movie.thumbnail}" alt="${movie.title}">
            </div>
            <div class="card-content">
              <h3 class="card-title">${movie.title}</h3>
              <p class="card-description">${movie.description}</p>
            </div>
          `;

          // Redirect to player page with movie ID when clicked
          cardDiv.addEventListener("click", () => {
            window.location.href = `player.html?id=${docId}`;
          });

          cardGrid.appendChild(cardDiv);
        });
      } catch (error) {
        console.error("Error loading movies:", error);
      }
    }

    // 3. Handle Log Out
    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", () => {
        signOut(auth).then(() => {
          window.location.href = "index.html";
        });
      });
    }
  </script>
</body>
</html>
