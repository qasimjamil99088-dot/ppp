<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Player</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .player-section { max-width: 900px; margin: 40px auto; padding: 20px; text-align: center; }
    .iframe-container { position: relative; width: 100%; padding-bottom: 56.25%; /* 16:9 Aspect Ratio */ height: 0; }
    .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 12px; }
    .movie-details { margin-top: 20px; text-align: left; }
    .back-btn { display: inline-block; margin-bottom: 20px; color: #2563eb; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

  <div class="player-section">
    <a href="home.html" class="back-btn">&larr; Back to Home</a>
    
    <!-- Google Drive Embed Frame -->
    <div class="iframe-container">
      <iframe id="drivePlayer" src="" allow="autoplay" allowfullscreen></iframe>
    </div>

    <div class="movie-details">
      <h1 id="movieTitle">Loading...</h1>
      <p id="movieDesc"></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCQdkuuTAvR7W7O4AKzvLG4E6p4yzRABJc",
      authDomain: "opih-e3eb5.firebaseapp.com",
      projectId: "opih-e3eb5",
      storageBucket: "opih-e3eb5.firebasestorage.app",
      messagingSenderId: "892201531636",
      appId: "1:892201531636:web:3765735604a0616752c6a1",
      measurementId: "G-9ZZ96PBRSP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        loadMovie();
      }
    });

    async function loadMovie() {
      const urlParams = new URLSearchParams(window.location.search);
      const movieId = urlParams.get('id');

      if (!movieId) {
        window.location.href = "home.html";
        return;
      }

      try {
        const docRef = doc(db, "movies", movieId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const movie = docSnap.data();

          document.getElementById("movieTitle").textContent = movie.title;
          document.getElementById("movieDesc").innerHTML = movie.description;

          // Set the Google Drive preview link
          const drivePlayer = document.getElementById("drivePlayer");
          drivePlayer.src = `https://drive.google.com/file/d/${movie.driveFileId}/preview`;
        } else {
          alert("Movie not found!");
          window.location.href = "home.html";
        }
      } catch (err) {
        console.error("Error loading movie:", err);
      }
    }
  </script>
</body>
</html>
